<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="mouth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background tile in the Saropa teal family. -->
  <rect x="2" y="2" width="124" height="124" rx="26" fill="#0F2A2A"/>

  <!-- Referee-whistle silhouette (CC0 baseline, openclipart 188941): a round
       chamber, a lanyard ring off the left, and a mouthpiece bar tangent to the
       top of the chamber extending right. Drawn back-to-front so the chamber
       overlaps the inner end of each attachment. -->

  <!-- Lip nub raised on the top of the mouthpiece, near the chamber. -->
  <rect x="74" y="34" width="13" height="12" rx="3" fill="url(#mouth)" stroke="#0B3B38" stroke-width="3" stroke-linejoin="round"/>

  <!-- Mouthpiece: horizontal bar tangent to the chamber top, blowing end on the right. -->
  <path d="M60 44 H106 a9 9 0 0 1 9 9 v1 a9 9 0 0 1 -9 9 H60 Z" fill="url(#mouth)" stroke="#0B3B38" stroke-width="3" stroke-linejoin="round"/>

  <!-- Lanyard ring on the left of the chamber. -->
  <circle cx="26" cy="80" r="11" fill="none" stroke="#CBD5E1" stroke-width="6"/>

  <!-- Whistle chamber (the round body). -->
  <circle cx="64" cy="80" r="32" fill="url(#body)" stroke="#0B3B38" stroke-width="3"/>

  <!-- Sound hole on the chamber face. -->
  <circle cx="64" cy="82" r="8" fill="#0B3B38" opacity="0.85"/>

  <!-- Gloss highlight on the upper-left curve of the chamber. -->
  <ellipse cx="50" cy="62" rx="11" ry="5" fill="#FFFFFF" opacity="0.28" transform="rotate(-32 50 62)"/>
</svg>
